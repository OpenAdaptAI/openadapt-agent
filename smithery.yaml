# Smithery configuration for openadapt-agent (Beta v2).
#
# Exposes compiled openadapt-flow workflow bundles as governed MCP tools
# over stdio. The bundle directory is the operator's OWN private artifact:
# Smithery collects its path/config at launch; nothing about a user's
# compiled workflow is baked into this package or its registry listing.
#
# Reference: https://smithery.ai/docs/build/project-config/smithery.yaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - bundlesDir
    properties:
      bundlesDir:
        type: string
        title: Bundles directory
        description: >-
          Path to a directory of compiled openadapt-flow bundles (either a
          single bundle, or a directory whose immediate subdirectories are
          bundles). This is your own private artifact.
      allowRun:
        type: boolean
        title: Allow governed workflow execution
        default: false
        description: >-
          When false (default), only the read-only tools (list_workflows,
          get_workflow, get_run_report, list_needs_attention, and
          get_attention_item) are registered. When true, each loadable bundle
          also gets a run_workflow_<opaque-id> tool that executes through the
          governed `openadapt-flow run` CLI. A halt or refusal is never
          presented as success.
      runsDir:
        type: string
        title: Local runs directory
        default: runs
        description: >-
          Local directory containing governed run reports, durable pauses,
          and Needs Attention state. Protected evidence remains here.
      allowAttendedActions:
        type: boolean
        title: Allow attended decisions
        default: false
        description: >-
          Register governed Teach and Escalate actions for signed pauses.
          When deploymentConfig is also set, register Continue and Skip
          through Flow's live verifier and deterministic resume path.
      deploymentConfig:
        type: string
        title: Flow deployment config
        description: >-
          Optional path to a qualified openadapt-flow deployment YAML. It is
          required for Continue and Skip and is fixed when the server starts.
      headed:
        type: boolean
        title: Keep attended browser visible
        default: false
        description: >-
          Keep a deployment-configured browser session visible to the local
          operator. Required for browser Continue and Skip.
      bundleKey:
        type: string
        title: Bundle decryption key
        description: >-
          Decryption key for encrypted-at-rest bundles (workflow.json.enc).
          Leave empty for plaintext bundles. Passed as OPENADAPT_BUNDLE_KEY.
  commandFunction: |-
    (config) => ({
      command: 'openadapt-agent',
      args: [
        'serve',
        '--bundles', config.bundlesDir,
        '--runs-dir', config.runsDir || 'runs',
        ...(config.allowRun ? ['--allow-run'] : []),
        ...(config.allowAttendedActions ? ['--allow-attended-actions'] : []),
        ...(config.deploymentConfig ? ['--config', config.deploymentConfig] : []),
        ...(config.headed ? ['--headed'] : [])
      ],
      env: config.bundleKey ? { OPENADAPT_BUNDLE_KEY: config.bundleKey } : {}
    })
  exampleConfig:
    bundlesDir: /path/to/compiled/bundles
    allowRun: false
    runsDir: runs
    allowAttendedActions: false
    headed: false
